<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Keko-Figueroa.Dev{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <div class="site-grid" aria-hidden="true"></div>
    <header class="site-header">
      <div class="container header-inner">
        <a class="site-logo mono" href="{{ url_for('home') }}">{{ site_name }}</a>
        <nav class="site-nav" aria-label="Main navigation">
          {% for label, endpoint in nav_links %}
          <a
            href="{{ url_for(endpoint) }}"
            {% if request.endpoint == endpoint %}class="active" aria-current="page"{% endif %}
          >{{ label }}</a>
          {% endfor %}
        </nav>
      </div>
    </header>

    <main class="container main-content">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p class="mono footer-copy">&copy; {{ site_name }}</p>
        <nav class="footer-links" aria-label="Footer links">
          <a href="mailto:{{ site_email }}">{{ site_email }}</a>
          <a href="{{ site_github }}" target="_blank" rel="noopener noreferrer">GitHub</a>
          <a href="{{ site_linkedin }}" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        </nav>
      </div>
    </footer>
  </body>
</html>
