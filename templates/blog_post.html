{% extends "base.html" %}

{% block title %}{{ post.title }} — Keko-Figueroa.Dev{% endblock %}

{% block content %}
<article class="blog-article">
  <header class="blog-article-header">
    <p class="mono blog-meta"><a href="{{ url_for('blog') }}">← Blog</a> · {{ post.date }}</p>
    <h1>{{ post.title }}</h1>
    <p class="blog-excerpt">{{ post.excerpt }}</p>
  </header>
  <div class="prose">
    {% for paragraph in post.body %}
    <p>{{ paragraph }}</p>
    {% endfor %}
  </div>
</article>
{% endblock %}
