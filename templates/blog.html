{% extends "base.html" %}

{% block title %}Blog — Keko-Figueroa.Dev{% endblock %}

{% block content %}
<section class="page-header">
  <h1>Blog</h1>
  <p class="page-lead">Notes on fintech systems, data pipelines, and pragmatic AI.</p>
</section>

<ul class="post-list post-list-full">
  {% for post in posts %}
  <li class="post-item">
    <div class="post-item-body">
      <a href="{{ url_for('blog_post', slug=post.slug) }}">{{ post.title }}</a>
      <p class="post-excerpt">{{ post.excerpt }}</p>
    </div>
    <span class="post-date mono">{{ post.date }}</span>
  </li>
  {% endfor %}
</ul>
{% endblock %}
